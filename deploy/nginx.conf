# ============================================================
# Nginx — Configuración de producción
# Puntos Vive Digital · Alcaldía de Bugalagrande
#
# ANTES DE USAR:
#   1. Reemplazar DOMINIO_AQUI por el dominio real
#      Ej: pvd.bugalagrande.gov.co
#   2. Copiar a /etc/nginx/sites-available/pvd
#   3. Crear enlace simbólico:
#        sudo ln -s /etc/nginx/sites-available/pvd /etc/nginx/sites-enabled/
#   4. Obtener certificado SSL:
#        sudo certbot --nginx -d DOMINIO_AQUI
#   5. Recargar Nginx:
#        sudo nginx -t && sudo systemctl reload nginx
# ============================================================

# Redirige todo HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name DOMINIO_AQUI;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name DOMINIO_AQUI;

    # Certificados SSL (Certbot los rellena automáticamente)
    ssl_certificate     /etc/letsencrypt/live/DOMINIO_AQUI/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMINIO_AQUI/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Tamaño máximo de subida (imágenes de Evidencias)
    client_max_body_size 15M;

    # Logs de Nginx
    access_log /var/log/nginx/pvd_access.log;
    error_log  /var/log/nginx/pvd_error.log warn;

    # ── Archivos estáticos (CSS, JS, imágenes del sistema) ──
    # WhiteNoise los sirve desde Django, pero Nginx es más rápido.
    # Después de correr collectstatic, Nginx toma el relevo directamente.
    location /static/ {
        alias /var/www/pvd/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        gzip_static on;
    }

    # ── Archivos de media (imágenes de Evidencias subidas por usuarios) ──
    location /media/ {
        alias /var/www/pvd/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── Aplicación Django (Gunicorn) ──
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Evitar que Nginx buffer respuestas grandes (exports Excel)
        proxy_buffering    off;
    }

    # Ocultar versión de Nginx
    server_tokens off;
}
