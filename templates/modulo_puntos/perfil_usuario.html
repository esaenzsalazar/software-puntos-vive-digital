{% extends 'modulo_puntos/base.html' %}

{% block title %}Mi Perfil{% endblock %}

{% block content %}
<div class="card card--narrow">
    <div class="page-hero">
        <span class="eyebrow">Cuenta</span>
        <h2 class="page-title">Mi perfil</h2>
        <p class="muted">Actualiza tus datos y contraseña.</p>
    </div>
    <div class="user-banner">
        <p><strong>Rol:</strong> <span class="text-accent">{{ rol_usuario }}</span></p>
    </div>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <div class="actions">
            <button type="submit" class="btn">Guardar cambios</button>
            <a href="{% url 'modulo_puntos:panel_control' %}" class="btn btn-secondary">Volver al panel</a>
        </div>
    </form>
</div>
{% endblock %}
