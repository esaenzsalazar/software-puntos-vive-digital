{% extends 'modulo_puntos/base.html' %}

{% block title %}Registrar Servicio{% endblock %}

{% block content %}
<div class="card">
    <h2 class="page-title">Registrar Servicio</h2>
    <p class="muted">Ingresa la información del servicio prestado en el Punto Vive Digital.</p>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <div class="actions">
            <button type="submit" class="btn">Guardar</button>
            <a href="{% url 'modulo_puntos:panel_control' %}" class="btn btn-secondary">Volver al panel</a>
        </div>
    </form>
</div>
{% endblock %}
