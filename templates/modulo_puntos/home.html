<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel PVD - Bugalagrande</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-primary mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Puntos Vive Digital - Bugalagrande</span>
            <form action="{% url 'logout' %}" method="post" class="d-inline">
                {% csrf_token %}
                <button type="submit" class="btn btn-outline-light btn-sm">Cerrar Sesión</button>
            </form>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <div class="card shadow-sm p-4 mb-4 bg-white">
                    <h2>Bienvenido, {{ user.username }}</h2>
                    <p class="text-muted">Gestión administrativa del punto digital.</p>
                    <hr>
                    <div class="row mt-4">
                        <div class="col-md-4">
                            <div class="card border-primary text-center p-3">
                                <h5>Administrar Datos</h5>
                                <p class="small text-secondary">Gestionar ciudadanos, operadores y servicios.</p>
                                <a href="/admin/" class="btn btn-primary">Ir al Panel de Control</a>
                            </div>
                        </div>

                        <div class="col-md-4">
                            <div class="card border-success text-center p-3">
                                <h5>Nuevo Registro</h5>
                                <p class="small text-secondary">Registrar entrada de un ciudadano al punto.</p>
                                <a href="#" class="btn btn-success disabled">Próximamente</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
