<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Puntos Vive Digital{% endblock %}</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1d4ed8);
            color: #1f2937;
        }

        .navbar {
            background: rgba(15, 23, 42, 0.95);
            color: white;
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar h1 {
            margin: 0;
            font-size: 28px;
            font-weight: bold;
            color: white;
        }

        .navbar .menu {
            display: flex;
            align-items: center;
            gap: 18px;
            flex-wrap: wrap;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
        }

        .navbar a:hover {
            opacity: 0.85;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 16px 30px 16px;
        }

        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.10);
            padding: 24px;
            margin-bottom: 24px;
            width: 100%;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            width: 100%;
        }

        .menu-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            border-left: 6px solid #2563eb;
            min-height: 220px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .menu-card h3 {
            margin-top: 0;
            margin-bottom: 14px;
            color: #1d4ed8;
            font-size: 20px;
        }

        .menu-card p {
            color: #4b5563;
            font-size: 16px;
            line-height: 1.4;
            margin-bottom: 20px;
        }

        .btn {
            display: inline-block;
            background: #2563eb;
            color: white;
            padding: 12px 18px;
            border-radius: 10px;
            text-decoration: none;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            text-align: center;
            width: fit-content;
            max-width: 100%;
        }

        .btn:hover {
            background: #1d4ed8;
        }

        .btn-secondary {
            background: #64748b;
        }

        .btn-secondary:hover {
            background: #475569;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
            font-size: 15px;
        }

        .form-control,
        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="date"],
        input[type="time"],
        input[type="datetime-local"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 15px;
            margin-top: 6px;
            margin-bottom: 14px;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-check-input {
            transform: scale(1.2);
            margin-right: 8px;
        }

        .page-title {
            margin-top: 0;
            color: #0f172a;
            font-size: 32px;
        }

        .muted {
            color: #6b7280;
            font-size: 17px;
            line-height: 1.5;
        }

        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .alert {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: 15px;
        }

        .alert-success {
            background: #dcfce7;
            color: #166534;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
        }

        /* Tablets */
        @media (max-width: 992px) {
            .navbar {
                padding: 14px 18px;
            }

            .navbar h1 {
                font-size: 24px;
            }

            .navbar a {
                font-size: 16px;
            }

            .container {
                max-width: 100%;
                padding: 0 14px 24px 14px;
            }

            .page-title {
                font-size: 28px;
            }

            .menu-card {
                min-height: auto;
            }
        }

        /* Celulares */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                align-items: flex-start;
            }

            .navbar .menu {
                width: 100%;
                justify-content: flex-start;
                gap: 14px;
            }

            .navbar h1 {
                font-size: 22px;
            }

            .navbar a {
                font-size: 15px;
            }

            .container {
                margin: 18px auto;
                padding: 0 12px 20px 12px;
            }

            .card {
                padding: 18px;
                border-radius: 14px;
            }

            .page-title {
                font-size: 24px;
            }

            .muted {
                font-size: 15px;
            }

            .grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }

            .menu-card {
                padding: 20px;
            }

            .menu-card h3 {
                font-size: 18px;
            }

            .menu-card p {
                font-size: 15px;
            }

            .btn {
                width: 100%;
            }

            .actions {
                flex-direction: column;
            }

            .actions .btn {
                width: 100%;
            }
        }

        /* Celulares pequeños */
        @media (max-width: 480px) {
            .navbar {
                padding: 12px;
            }

            .navbar h1 {
                font-size: 20px;
            }

            .navbar .menu {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .card {
                padding: 16px;
            }

            .page-title {
                font-size: 22px;
            }

            .menu-card {
                padding: 16px;
            }

            .menu-card h3 {
                font-size: 17px;
            }

            .menu-card p {
                font-size: 14px;
            }

            .form-control,
            input[type="text"],
            input[type="email"],
            input[type="password"],
            input[type="date"],
            input[type="time"],
            input[type="datetime-local"],
            input[type="number"],
            select,
            textarea {
                font-size: 14px;
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    {% if user.is_authenticated %}
    <div class="navbar">
        <h1>Puntos Vive Digital</h1>
        <div class="menu">
            <a href="{% url 'modulo_puntos:panel_control' %}">Panel</a>
            <a href="{% url 'modulo_puntos:perfil_usuario' %}">Mi perfil</a>
            <a href="{% url 'modulo_puntos:logout' %}">Cerrar sesión</a>
        </div>
    </div>
    {% endif %}

    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert {% if message.tags == 'success' %}alert-success{% else %}alert-error{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>
</body>
</html>
