{% extends 'modulo_puntos/base.html' %}

{% block title %}Registrar Ciudadano{% endblock %}

{% block content %}
<div class="card">
    <h2 class="page-title">Registrar Ciudadano</h2>
    <p class="muted">Ingresa los datos del ciudadano atendido.</p>

    {% if form.errors %}
        <div style="background:#fee2e2; color:#991b1b; padding:12px; border-radius:8px; margin-bottom:16px;">
            {{ form.errors }}
        </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <div class="actions">
            <button type="submit" class="btn">Guardar</button>
            <a href="{% url 'modulo_puntos:panel_control' %}" class="btn btn-secondary">Volver al panel</a>
        </div>
    </form>
</div>
{% endblock %}
